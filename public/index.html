  <div class="container">
    <div class="readout-container">
      <h1>Readout Report Analysis and Certificate</h1>
      <form id="htmlForm" action="/preview" enctype="multipart/form-data" method="POST" autocomplete="off"
        style="position: relative">
        <!-- OPERATOR FIELD AND DROPDOWN -->
        <div id="operatorContainer" style="position: relative">
          <label for="operator">Operator:</label>
          <input type="text" id="operator" name="operator" onfocus="showOperatorDropdown()"
            onblur="hideOperatorDropdown()" autocomplete="off" placeholder="Enter Operator" />
          <div id="operatorDropdown" class="dropdown-list" style="display: none"></div>
        </div>

        <div class="form-row">
          <!-- A/C Reg input and dropdown container -->
          <div id="acRegContainer" style="position: relative; width: 60%;">
            <label for="acReg">A/C Reg:</label>
            <input type="text" id="acReg" name="acReg" required onfocus="showAcRegDropdown()"
              onblur="hideAcRegDropdown()" autocomplete="off" placeholder="Enter A/C Reg" />

            <div id="acRegDropdown" class="dropdown-list" style="display: none"></div>
          </div>
          <div id="sourceTypeContainer" style="position: relative;">
            <label for="sourceType">Source Type:</label>
            <input type="text" id="sourceTypeInput" name="sourceType" placeholder="Enter Source Type" required
              onfocus="showSourceTypeDropdown()" onblur="hideSourceTypeDropdown()" autocomplete="off" />
            <div id="sourceTypeDropdown" class="dropdown-list" style="display: none"></div>
          </div>
        </div>

        <!-- Auto-filled but editable fields -->
        <label for="typeOfAC">Type of A/C:</label>
        <input type="text" id="typeOfAC" name="typeOfAC" />

        <label id="pnSnLabel" for="fdrPnSn">FDR P/N-S/N:</label>
        <input type="text" id="fdrPnSn" name="fdrPnSn" />

        <label for="dataReceivedFrom">Data Received From:</label>
        <input type="text" id="dataReceivedFrom" name="dataReceivedFrom" />

        <div class="form-row">
          <div>
            <label for="dateOfDumping">Date of Dumping:</label>
            <div class="input-icon-wrap">
              <input type="text" id="dateOfDumping" name="dateOfDumping" placeholder="dd.mm.yyyy" />
              <svg class="calendar-icon" id="icon-dumping" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
              </svg>
            </div>
          </div>
          <div>
            <label for="dateOfFlight">Date of Flight:</label>
            <div class="input-icon-wrap">
              <input type="text" id="dateOfFlight" name="dateOfFlight" placeholder="dd.mm.yyyy" />
              <svg class="calendar-icon" id="icon-flight" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
              </svg>
            </div>
          </div>
        </div>

        <label for="flightSector">Flight Sector:</label>
        <input type="text" id="flightSector" name="flightSector" placeholder="Ex: BOM-DXB" pattern="[A-Za-z\-]+"
          title="Only alphabets and hyphens are allowed" />

        <label for="natureOfReadout">Nature of Readout:</label>
        <input type="text" id="natureOfReadout" name="natureOfReadout" />

        <div>
          <label for="workOrderNo">Work Order No:</label>
          <div class="input-icon-wrap">
            <input type="text" id="workOrderNo" name="workOrderNo" placeholder="E-mail dated : dd Month yyyy"
              readonly />

            <input type="date" id="hiddenWorkOrderDate"
              style="position: absolute; opacity: 0; width: 1px; height: 1px; pointer-events: none;">

            <svg class="calendar-icon" id="icon-workorder" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
          </div>
        </div>

        <label for="lflRefNo">LFL Ref No:</label>
        <input type="text" id="lflRefNo" name="lflRefNo" />

        <label for="noOfParametersRecorded">No of Parameters Recorded:</label>
        <input type="text" id="noOfParametersRecorded" name="noOfParametersRecorded" />

        <label for="noOfParametersSubmitted">No of Parameters Submitted for Evaluation:</label>
        <input type="text" id="noOfParametersSubmitted" name="noOfParametersSubmitted" />

        <!-- File Upload Section (in-form, styled as before) -->
        <div class="file-container" style="margin-top: 18px">
          <label id="uploadLabel" for="files">Upload FDR Data:</label>
          <input type="file" id="files" name="files" accept=".csv" multiple hidden onchange="handleFilesSelected()" />
          <label for="files" class="file-upload-btn" tabindex="0" aria-label="Choose CSV Files">Choose CSV Files</label>
          <ul id="file-list"></ul>
        </div>

        <!-- Preview/Generate Button, hidden until files are picked -->
        <button type="submit" id="previewBtn" style="display: none; margin-top: 16px">
          Generate Certificate Preview
        </button>
      </form>
    </div>
